services:
  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=postgres12
      - DB_PORT=${TEMPORAL_DB_PORT:-5432}
      - POSTGRES_USER=${TEMPORAL_DB_USER}
      - POSTGRES_PWD=${TEMPORAL_DB_PWD}
      - POSTGRES_SEEDS=${TEMPORAL_DB_HOST}
    env_file: .env.temporal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tctl", "cluster", "health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prod
    ports:
      - "8000:8000"
    env_file: .env.prod
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_REGION=us-east-1
      - TEMPORAL_ADDRESS=temporal:7233
    volumes:
      - ./gcp-sa-key.json:/app/gcp-sa-key.json:ro
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  temporal-worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prod
    command: ["python", "-m", "app.micro_apps.title_intelligence.pipeline.temporal_worker"]
    env_file: .env.prod
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_REGION=us-east-1
      - TEMPORAL_ADDRESS=temporal:7233
    volumes:
      - ./gcp-sa-key.json:/app/gcp-sa-key.json:ro
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
