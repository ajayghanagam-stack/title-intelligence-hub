name: Deploy to AWS

on:
  push:
    branches: [main]

concurrency:
  group: aws-deploy
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  PREFIX: ti-hub-prod
  APP_DIR: /opt/ti-hub
  COMPOSE_FILE: infra/prod/docker-compose.prod.yml

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch secrets from SSM
        id: secrets
        run: |
          DATABASE_URL=$(aws ssm get-parameter --name "/${{ env.PREFIX }}/database-url" --with-decryption --query "Parameter.Value" --output text)
          JWT_SECRET=$(aws ssm get-parameter --name "/${{ env.PREFIX }}/jwt-secret" --with-decryption --query "Parameter.Value" --output text)
          GOOGLE_API_KEY=$(aws ssm get-parameter --name "/${{ env.PREFIX }}/google-api-key" --with-decryption --query "Parameter.Value" --output text 2>/dev/null || echo "")
          ANTHROPIC_API_KEY=$(aws ssm get-parameter --name "/${{ env.PREFIX }}/anthropic-api-key" --with-decryption --query "Parameter.Value" --output text 2>/dev/null || echo "")
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="${{ env.PREFIX }}-storage-${ACCOUNT_ID}"

          # Mask secrets in logs
          echo "::add-mask::${DATABASE_URL}"
          echo "::add-mask::${JWT_SECRET}"
          echo "::add-mask::${GOOGLE_API_KEY}"
          echo "::add-mask::${ANTHROPIC_API_KEY}"

          # Build .env.prod content
          {
            echo "DATABASE_URL=${DATABASE_URL}"
            echo "JWT_SECRET=${JWT_SECRET}"
            echo "GOOGLE_API_KEY=${GOOGLE_API_KEY}"
            echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}"
            echo "STORAGE_PROVIDER=s3"
            echo "S3_BUCKET=${S3_BUCKET}"
            echo "S3_REGION=${{ env.AWS_REGION }}"
            echo "PIPELINE_BACKEND=background_tasks"
            echo "AI_PROVIDER=gemini"
            echo "NATIVE_PDF_CONCURRENCY=12"
            echo "NATIVE_PDF_BATCH_SIZE=20"
            echo "TRIAGE_CONCURRENCY=4"
            echo "CORS_ORIGINS=[\"http://${{ secrets.EC2_HOST }}\"]"
            echo "DEBUG=false"
          } > /tmp/env.prod

          echo "s3_bucket=${S3_BUCKET}" >> $GITHUB_OUTPUT

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload .env.prod
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/env.prod ec2-user@${{ secrets.EC2_HOST }}:${{ env.APP_DIR }}/infra/prod/.env.prod

      - name: Pull latest code
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ec2-user@${{ secrets.EC2_HOST }} \
            "cd ${{ env.APP_DIR }} && git fetch origin main && git reset --hard origin/main"

      - name: Build and deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ec2-user@${{ secrets.EC2_HOST }} \
            "cd ${{ env.APP_DIR }} && \
             NEXT_PUBLIC_API_URL=http://${{ secrets.EC2_HOST }} \
             docker compose -f ${{ env.COMPOSE_FILE }} up -d --build"

      - name: Run migrations
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ec2-user@${{ secrets.EC2_HOST }} \
            "cd ${{ env.APP_DIR }} && \
             docker compose -f ${{ env.COMPOSE_FILE }} exec -T backend \
             alembic upgrade head"

      - name: Run seed
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ec2-user@${{ secrets.EC2_HOST }} \
            "cd ${{ env.APP_DIR }} && \
             docker compose -f ${{ env.COMPOSE_FILE }} exec -T backend \
             python scripts/seed.py" || true

      - name: Health check
        run: |
          echo "Checking http://${{ secrets.EC2_HOST }}/api/v1/health"
          for i in {1..10}; do
            if curl -sf "http://${{ secrets.EC2_HOST }}/api/v1/health"; then
              echo ""
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 10 attempts"
          exit 1

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key /tmp/env.prod
