name: LLM Evals

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Golden dataset to evaluate (blank = all)"
        required: false
        default: ""
  # Optionally run on version tags
  push:
    tags:
      - "v*"

jobs:
  eval:
    name: Run LLM Evals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Tesseract
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Run offline evals (no API key needed)
        run: cd backend && python scripts/run_evals.py --offline
        env:
          DEBUG: "true"

      - name: Run LLM evals
        if: env.GOOGLE_API_KEY != ''
        run: |
          cd backend
          ARGS=""
          if [ -n "${{ github.event.inputs.dataset }}" ]; then
            ARGS="--dataset ${{ github.event.inputs.dataset }}"
          fi
          python scripts/run_evals.py $ARGS
        env:
          DEBUG: "true"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: backend/eval_reports/
          if-no-files-found: ignore

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportDir = 'backend/eval_reports';
            if (!fs.existsSync(reportDir)) return;
            const files = fs.readdirSync(reportDir).filter(f => f.endsWith('.json'));
            if (files.length === 0) return;
            const latest = JSON.parse(fs.readFileSync(`${reportDir}/${files[files.length - 1]}`));
            const status = latest.passed ? '✅ PASSED' : '❌ FAILED';
            const body = `## LLM Eval Results ${status}\n\nDataset: ${latest.dataset}\nTimestamp: ${latest.timestamp}\n`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
